<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokémon</title>
    <link rel="stylesheet" href="style.css">
    
    <script src="js/jquery3.7.1.js"></script>
    
    
    <script src="data/type_effectiveness.js"></script>
    <script src="data/pokemons.js"></script>
    <script src="data/pokemon_types.js"></script>
    <script src="data/fast_moves.js"></script>
    <script src="data/charged_moves.js"></script>
    <script src="data/pokemon_moves.js"></script>
    
    
    <script src="data/class_type.js"></script>
    <script src="data/class_attack.js"></script>
    <script src="data/class_pokemon.js"></script>
    
   
    <script src="js/script.js"></script> 
</head>
<body>
    <main>
        <h1>Tout les Pokémons</h1>
        <h2>Toutes les infos sur tout les Pokémons existants !</h2>
        
        <table>
            <thead>
                <th>ID</th>
                <th>Nom</th>
                <th>Type(s)</th>
                <th>PV</th>
                <th>ATK</th>
                <th>DEF</th>
                <th>Image</th>
            </thead>
            <tbody>

            </tbody>
        </table>
        
        <!-- Navigation entre les pages -->
        <div class="pagination">
            <button id="btn-prec" class="nav-btn">PREC</button>
            <span id="page-info">Page 1 sur 0</span>
            <button id="btn-suiv" class="nav-btn">SUIV</button>
        </div>
    </main>
    
    <!-- Popup pour afficher les détails du Pokémon -->
    <div id="modal-details" class="modal" style="display: none;">
        <div class="modal-content">
            <button id="close-btn" class="close-btn">X</button>
            <h2 id="modal-title">Détails du Pokémon</h2>
            <div id="modal-body">
                <p id="modal-info"></p>
                <h3>Attaques rapides</h3>
                <ul id="fast-attacks-list"></ul>
                <h3>Attaques chargées</h3>
                <ul id="charged-attacks-list"></ul>
            </div>
        </div>
    </div>
    
    <!-- Image agrandie en survol -->
    <div id="image-popup" class="image-popup" style="display: none;">
        <img id="bigger-image" src="" alt="Pokémon">
    </div>
</body>
</html>
